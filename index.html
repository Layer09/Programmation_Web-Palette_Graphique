<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Palette Graphique</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
    <button id="drawMode">✎</button>  <!-- bouton dessins -->
    <button id="moveMode">✢</button> <!-- bouton deplacement -->
    <button id="deleteMode">✕</button> <!-- bouton supprimer -->
    <hr>
    <input type="color" id="colorPicker" value="#ff0000">
    <hr>
    <button id="rectangle" data-shape="rectangle">▮</button> <!-- bouton rectangle -->
    <button id="circle" data-shape="circle">●</button> <!-- bouton cercle -->
    <button id="triangle" data-shape="triangle">▲</button> <!-- bouton triangle -->

</div>

<div id="canvas"></div>

<script src="script.js"></script>
</body>
</html>
