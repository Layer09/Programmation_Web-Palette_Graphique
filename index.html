<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Palette Graphique</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
    <button data-shape="rectangle">Rectangle</button>
    <button data-shape="circle">Cercle</button>

</div>

<div id="canvas"></div>

<script src="script.js"></script>
</body>
</html>
