<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Palette Graphique</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
    <button id="drawMode">✎</button>
    <button id="moveMode">✢</button>
    <button id="deleteMode">✕</button>
    <br><br>
    <input type="color" id="colorPicker" value="#ff0000">
    <br><br>
    <button id="rectangle" data-shape="rectangle">▮</button>
    <button id="circle" data-shape="circle">●</button>
    <button id="triangle" data-shape="triangle">▲</button>

</div>

<div id="canvas"></div>

<script src="script.js"></script>
</body>
</html>
