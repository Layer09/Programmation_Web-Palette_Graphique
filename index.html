<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Palette Graphique</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
    <button id="drawMode">Dessin</button>
    <button id="moveMode">Déplacement</button>
    <button id="deleteMode">Suppression</button>

    <input type="color" id="colorPicker" value="#ff0000">

    <button data-shape="rectangle" style="text-size: 5px;">▮</button>
    <button data-shape="circle" style="text-size: 5px;">●</button>
    <button data-shape="triangle" style="text-size: 5px;">▲</button>

</div>

<div id="canvas"></div>

<script src="script.js"></script>
</body>
</html>
